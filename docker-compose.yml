version: '3.9'

x-common-env: &common-env
  PROJECT_ROOT: /app
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MODEL_NAME: iris_classifier
  DRIFT_THRESHOLD: 0.20
  PERFORMANCE_THRESHOLD: 0.85
  MIN_ACCEPTABLE_IMPROVEMENT: 0.00
  RANDOM_STATE: 42
  LOG_LEVEL: INFO

services:
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: self_healing_api
    restart: unless-stopped
    depends_on:
      - mlflow
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  postgres:
    image: postgres:15
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      <<: *common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
      AIRFLOW__WEBSERVER__SECRET_KEY: supersecret
      PYTHONPATH: /app
    user: "50000:0"
    volumes:
      - ./:/app
    command: >
      bash -c "airflow db init && airflow users create
      --username admin --firstname admin --lastname admin
      --role Admin --email admin@example.com --password admin"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      <<: *common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__WEBSERVER__SECRET_KEY: supersecret
      AIRFLOW__WEBSERVER__RBAC: 'True'
      PYTHONPATH: /app
    user: "50000:0"
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    command: airflow webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-webserver
    environment:
      <<: *common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      PYTHONPATH: /app
    user: "50000:0"
    volumes:
      - ./:/app
    command: airflow scheduler

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: self_healing_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

volumes:
  postgres_data:
